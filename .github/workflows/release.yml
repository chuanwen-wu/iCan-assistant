name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Verify tag matches plugin.json version
        run: |
          tag_ver="${GITHUB_REF_NAME#v}"
          plugin_ver=$(jq -r .version .claude-plugin/plugin.json)
          if [ "$tag_ver" != "$plugin_ver" ]; then
            echo "Tag $GITHUB_REF_NAME does not match plugin.json version $plugin_ver"
            echo "Bump .claude-plugin/plugin.json before tagging."
            exit 1
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "ican-assistant $GITHUB_REF_NAME" \
            --generate-notes
